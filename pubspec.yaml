name: collectarr_app
description: Offline-first Collectarr metadata and library client.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  dio: ^5.7.0
  drift: ^2.21.0
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  sqlite3: ^3.3.1
  sqlite3_flutter_libs: ^0.6.0+eol
  uuid: ^4.5.1
  mobile_scanner: ^7.2.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  http: ^1.2.2
  csv: ^8.0.0
  qr_flutter: ^4.1.0
  xml: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.21.2

flutter:
  uses-material-design: true
