name: collectarr_app
description: Offline-first Collectarr metadata and library client.
publish_to: "none"
version: 0.2.0-beta.1+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  dio: ^5.7.0
  drift: ^2.34.0
  path: ^1.9.1
  path_provider: ^2.1.6
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.3.0
  sqlite3: ^3.3.3
  sqlite3_flutter_libs: ^0.6.0+eol
  uuid: ^4.5.1
  mobile_scanner: ^7.4.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  image: ^4.8.0
  google_mlkit_text_recognition: ^0.15.0
  csv: ^8.0.0
  archive: ^4.0.9
  crypto: ^3.0.6
  file_selector: ^1.0.3
  qr_flutter: ^4.1.0
  xml: ^7.0.1
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.1
  pdf: ^3.11.1
  printing: ^5.13.3
  barcode: ^2.2.8
  go_router: ^17.2.3
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.34.0

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
