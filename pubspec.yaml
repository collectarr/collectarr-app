name: collectarr_app
description: Offline-first Collectarr metadata and library client.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  drift: ^2.21.0
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  sqlite3_flutter_libs: ^0.5.26
  uuid: ^4.5.1
  mobile_scanner: ^6.0.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.21.2

flutter:
  uses-material-design: true
