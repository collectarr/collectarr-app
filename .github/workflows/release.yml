name: Release

on:
  workflow_dispatch:
    inputs:
      metadata_base_url:
        description: "Collectarr Core metadata API base URL"
        required: true
        default: "http://192.168.0.142:8010"
        type: string
      sync_base_url:
        description: "Collectarr Sync API base URL"
        required: true
        default: "http://192.168.0.142:8020"
        type: string
      sync_key:
        description: "Sync API key embedded in web build"
        required: true
        default: "replace-with-sync-key"
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Read Flutter app version
        id: app_version
        shell: bash
        run: |
          version="$(sed -n 's/^version: //p' pubspec.yaml | cut -d'+' -f1)"
          if [ -z "$version" ]; then
            echo "::error title=Missing pubspec version::Could not read version from pubspec.yaml"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Preview release version
        id: semantic_preview
        uses: cycjimmy/semantic-release-action@v6
        with:
          dry_run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Flutter app version matches release version
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        shell: bash
        run: |
          expected="${{ steps.semantic_preview.outputs.new_release_version }}"
          actual="${{ steps.app_version.outputs.version }}"
          if [ "$actual" != "$expected" ]; then
            echo "::error title=pubspec.yaml version mismatch::pubspec.yaml is $actual but semantic-release plans $expected. Update pubspec.yaml before running the release workflow."
            exit 1
          fi

      - name: Release
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'

      - name: Install dependencies
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        run: flutter pub get

      - name: Generate Drift code
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web bundle
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        run: |
          flutter build web --release \
            --dart-define=COLLECTARR_API_BASE_URL=${{ inputs.metadata_base_url }} \
            --dart-define=COLLECTARR_SYNC_BASE_URL=${{ inputs.sync_base_url }} \
            --dart-define=COLLECTARR_SYNC_KEY=${{ inputs.sync_key }}

      - name: Set up Docker Buildx
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/collectarr-app-web:v${{ steps.semantic_preview.outputs.new_release_version }}
            ghcr.io/${{ github.repository_owner }}/collectarr-app-web:latest

      - name: No release needed
        if: steps.semantic_preview.outputs.new_release_published != 'true'
        run: echo "No releasable changes detected."
