name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

env:
  METADATA_BASE_URL: ${{ secrets.COLLECTARR_METADATA_BASE_URL }}

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_published: ${{ steps.semantic_preview.outputs.new_release_published }}
      release_version: ${{ steps.semantic_preview.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Read Flutter app version
        id: app_version
        shell: bash
        run: |
          version="$(sed -n 's/^version: //p' pubspec.yaml | cut -d'+' -f1)"
          if [ -z "$version" ]; then
            echo "::error title=Missing pubspec version::Could not read version from pubspec.yaml"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Preview release version
        id: semantic_preview
        uses: cycjimmy/semantic-release-action@v6
        with:
          dry_run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Flutter app version matches release version
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        shell: bash
        run: |
          expected="${{ steps.semantic_preview.outputs.new_release_version }}"
          actual="${{ steps.app_version.outputs.version }}"
          if [ "$actual" != "$expected" ]; then
            echo "::error title=pubspec.yaml version mismatch::pubspec.yaml is $actual but semantic-release plans $expected. Update pubspec.yaml before running the release workflow."
            exit 1
          fi

      - name: Release
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'

      - name: Install dependencies
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        run: flutter pub get --enforce-lockfile

      - name: Generate Drift code
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web bundle
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        run: |
          if [ -z "$METADATA_BASE_URL" ]; then
            echo "::error title=Missing metadata URL::Set COLLECTARR_METADATA_BASE_URL as a repo/org secret."
            exit 1
          fi
          flutter build web --release \
            --dart-define=COLLECTARR_API_BASE_URL=$METADATA_BASE_URL

      - name: Set up Docker Buildx
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/collectarr-app-web:v${{ steps.semantic_preview.outputs.new_release_version }}
            ghcr.io/${{ github.repository_owner }}/collectarr-app-web:latest

      - name: Upload web bundle asset
        if: steps.semantic_preview.outputs.new_release_published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.semantic_preview.outputs.new_release_version }}
        shell: bash
        run: |
          mkdir -p dist
          (cd build/web && zip -r ../../dist/collectarr-web-v${RELEASE_VERSION}.zip .)
          gh release upload "v${RELEASE_VERSION}" "dist/collectarr-web-v${RELEASE_VERSION}.zip" --clobber

      - name: No release needed
        if: steps.semantic_preview.outputs.new_release_published != 'true'
        run: echo "No releasable changes detected."

  release-android:
    needs: release
    if: needs.release.outputs.release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android artifacts
        run: |
          flutter build apk --release --dart-define=COLLECTARR_API_BASE_URL=$METADATA_BASE_URL

      - name: Upload Android assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
        shell: bash
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/collectarr-android-v${RELEASE_VERSION}.apk
          gh release upload "v${RELEASE_VERSION}" dist/collectarr-android-v${RELEASE_VERSION}.apk --clobber

  release-windows:
    needs: release
    if: needs.release.outputs.release_published == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows app
        run: flutter build windows --release --dart-define=COLLECTARR_API_BASE_URL=$METADATA_BASE_URL

      - name: Optionally sign Windows binaries
        shell: pwsh
        env:
          SIGN_CERT_BASE64: ${{ secrets.COLLECTARR_WINDOWS_SIGN_PFX_BASE64 }}
          SIGN_CERT_PASSWORD: ${{ secrets.COLLECTARR_WINDOWS_SIGN_PFX_PASSWORD }}
          SIGN_TIMESTAMP_URL: ${{ vars.COLLECTARR_WINDOWS_SIGN_TIMESTAMP_URL || 'http://timestamp.digicert.com' }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGN_CERT_BASE64) -or [string]::IsNullOrWhiteSpace($env:SIGN_CERT_PASSWORD)) {
            Write-Output "Signing secrets not configured; publishing unsigned Windows binaries."
            exit 0
          }

          $certPath = Join-Path $env:RUNNER_TEMP "collectarr-signing.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:SIGN_CERT_BASE64))

          $signTool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Filter signtool.exe -Recurse |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signTool) {
            throw "signtool.exe not found in Windows SDK."
          }

          $targets = Get-ChildItem "build/windows/x64/runner/Release" -File |
            Where-Object { $_.Extension -in @(".exe", ".dll") }
          foreach ($target in $targets) {
            & $signTool.FullName sign /fd SHA256 /f $certPath /p $env:SIGN_CERT_PASSWORD /tr $env:SIGN_TIMESTAMP_URL /td SHA256 $target.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to sign $($target.FullName)"
            }
          }

          Remove-Item $certPath -Force

      - name: Package Windows portable artifact
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "dist/collectarr-windows-portable-v$env:RELEASE_VERSION.zip" -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Package Windows installer
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
        run: |
          $iss = @"
          [Setup]
          AppId={{4A0B73CB-02AA-4D1D-8A20-1D2B4F6E31C3}
          AppName=Collectarr
          AppVersion=$env:RELEASE_VERSION
          DefaultDirName={autopf}\Collectarr
          DefaultGroupName=Collectarr
          OutputDir=dist
          OutputBaseFilename=collectarr-windows-installer-v$env:RELEASE_VERSION
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern

          [Files]
          Source: "build\\windows\\x64\\runner\\Release\\*"; DestDir: "{app}"; Flags: recursesubdirs ignoreversion

          [Icons]
          Name: "{group}\\Collectarr"; Filename: "{app}\\collectarr_app.exe"
          Name: "{group}\\Uninstall Collectarr"; Filename: "{uninstallexe}"

          [Run]
          Filename: "{app}\\collectarr_app.exe"; Description: "Launch Collectarr"; Flags: nowait postinstall skipifsilent
          "@
          $issPath = "collectarr-installer.iss"
          Set-Content -Path $issPath -Value $iss -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" $issPath
          Remove-Item $issPath -Force

      - name: Upload Windows asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
        run: |
          gh release upload "v$env:RELEASE_VERSION" `
            "dist/collectarr-windows-portable-v$env:RELEASE_VERSION.zip" `
            "dist/collectarr-windows-installer-v$env:RELEASE_VERSION.exe" `
            --clobber

  release-macos:
    needs: release
    if: needs.release.outputs.release_published == 'true' && vars.COLLECTARR_ENABLE_MACOS_RELEASE == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS app
        run: flutter build macos --release --dart-define=COLLECTARR_API_BASE_URL=$METADATA_BASE_URL

      - name: Package macOS portable artifact
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
        shell: bash
        run: |
          mkdir -p dist
          app_path="$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "::error title=Missing macOS app bundle::Could not find built .app in build/macos/Build/Products/Release"
            exit 1
          fi
          ditto -c -k --keepParent "$app_path" "dist/collectarr-macos-portable-v${RELEASE_VERSION}.zip"

      - name: Package macOS installer
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
        shell: bash
        run: |
          app_path="$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "::error title=Missing macOS app bundle::Could not find built .app in build/macos/Build/Products/Release"
            exit 1
          fi
          hdiutil create -volname "Collectarr" -srcfolder "$app_path" -ov -format UDZO "dist/collectarr-macos-installer-v${RELEASE_VERSION}.dmg"

      - name: Upload macOS asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
        shell: bash
        run: |
          gh release upload "v${RELEASE_VERSION}" \
            "dist/collectarr-macos-portable-v${RELEASE_VERSION}.zip" \
            "dist/collectarr-macos-installer-v${RELEASE_VERSION}.dmg" \
            --clobber

  release-linux:
    needs: release
    if: needs.release.outputs.release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux app
        run: flutter build linux --release --dart-define=COLLECTARR_API_BASE_URL=$METADATA_BASE_URL

      - name: Package Linux portable artifact
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
        shell: bash
        run: |
          mkdir -p dist
          tar -C build/linux/x64/release -czf "dist/collectarr-linux-portable-v${RELEASE_VERSION}.tar.gz" bundle

      - name: Package Linux installer (.deb)
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
        shell: bash
        run: |
          mkdir -p pkgroot/DEBIAN pkgroot/usr/lib/collectarr-app pkgroot/usr/bin
          cp -a build/linux/x64/release/bundle/. pkgroot/usr/lib/collectarr-app/
          executable="$(find pkgroot/usr/lib/collectarr-app -maxdepth 1 -type f -executable | head -n 1 | xargs basename)"
          if [ -z "$executable" ]; then
            echo "::error title=Missing Linux binary::Could not detect executable in linux bundle"
            exit 1
          fi
          cat > pkgroot/DEBIAN/control <<EOF
          Package: collectarr-app
          Version: ${RELEASE_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Collectarr
          Description: Collectarr desktop application
          EOF
          cat > pkgroot/usr/bin/collectarr-app <<EOF
          #!/usr/bin/env bash
          exec /usr/lib/collectarr-app/${executable} "\$@"
          EOF
          chmod 755 pkgroot/usr/bin/collectarr-app
          dpkg-deb --build pkgroot "dist/collectarr-linux-installer-v${RELEASE_VERSION}.deb"

      - name: Upload Linux assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
        shell: bash
        run: |
          gh release upload "v${RELEASE_VERSION}" \
            "dist/collectarr-linux-portable-v${RELEASE_VERSION}.tar.gz" \
            "dist/collectarr-linux-installer-v${RELEASE_VERSION}.deb" \
            --clobber
