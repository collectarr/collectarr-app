name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: |
          set -euo pipefail
          output="$(flutter analyze 2>&1 || true)"
          printf '%s\n' "$output"
          if printf '%s\n' "$output" | grep -q 'error •'; then
            exit 1
          fi

      - name: Run tests
        run: flutter test

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        run: flutter build web --release
