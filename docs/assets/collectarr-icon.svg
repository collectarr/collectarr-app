<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Collectarr app icon</title>
  <desc id="desc">A dark rounded-square icon with a cloud and colorful catalog spines.</desc>
  <defs>
